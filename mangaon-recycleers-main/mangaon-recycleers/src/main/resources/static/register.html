<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Create Admin Account · Mangaon Recyclers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        :root {
            --bg:        #070b12;
            --bg1:       #0c1220;
            --bg3:       #161f30;
            --border:    rgba(255,255,255,.07);
            --border2:   rgba(255,255,255,.13);
            --ink:       #f0f4ff;
            --ink2:      #a8b4cc;
            --ink3:      #5c6a82;
            --primary:   #6366f1;
            --accent:    #10b981;
            --danger:    #f43f5e;
            --mono:      'JetBrains Mono', monospace;
            --display:   'Outfit', sans-serif;
            --r:         10px;
            --r2:        16px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--display);
            font-size: 14px;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(99,102,241,.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(16,185,129,.06) 0%, transparent 50%),
                linear-gradient(rgba(59,130,246,.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,.02) 1px, transparent 1px);
            background-size: auto, auto, 32px 32px, 32px 32px;
        }
        .card {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            padding: 2rem 2rem 1.75rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(99,102,241,.06);
            animation: fadeUp .35s ease both;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .brand { display: flex; align-items: center; gap: .625rem; margin-bottom: 1.5rem; }
        .brand-mark {
            width: 36px; height: 36px; border-radius: 9px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1rem;
            box-shadow: 0 4px 14px rgba(99,102,241,.4); flex-shrink: 0;
        }
        .brand-name { font-size: .875rem; font-weight: 700; letter-spacing: -.02em; color: var(--ink); }
        .brand-sub {
            display: block; font-family: var(--mono); font-size: .58rem;
            color: var(--ink3); letter-spacing: .06em; text-transform: uppercase; margin-top: 1px;
        }
        .card-title { font-size: 1.35rem; font-weight: 800; letter-spacing: -.03em; color: var(--ink); margin-bottom: .3rem; }
        .card-sub { font-size: .78rem; color: var(--ink3); margin-bottom: 1.5rem; line-height: 1.5; }
        .divider { height: 1px; background: var(--border); margin-bottom: 1.5rem; }
        .field { margin-bottom: 1rem; }
        .field-label {
            display: block; font-family: var(--mono); font-size: .62rem;
            font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
            color: var(--ink3); margin-bottom: .4rem;
        }
        .field-label .req { color: var(--danger); margin-left: 2px; }
        .input-wrap { position: relative; }
        .field-icon {
            position: absolute; left: .75rem; top: 50%;
            transform: translateY(-50%); color: var(--ink3);
            font-size: .85rem; pointer-events: none; z-index: 1;
        }
        .field-input {
            width: 100%; background: var(--bg3); border: 1px solid var(--border2);
            border-radius: var(--r); padding: .625rem .875rem .625rem 2.4rem;
            font-family: var(--display); font-size: .875rem; color: var(--ink);
            outline: none; transition: border-color .15s, box-shadow .15s; -webkit-appearance: none;
        }
        .field-input::placeholder { color: var(--ink3); }
        .field-input:focus { border-color: rgba(99,102,241,.55); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
        .field-input.error   { border-color: rgba(244,63,94,.5); }
        .field-input.success { border-color: rgba(16,185,129,.4); }
        .eye-btn {
            position: absolute; right: .625rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--ink3); cursor: pointer;
            font-size: .9rem; padding: .2rem; transition: color .14s; z-index: 1;
        }
        .eye-btn:hover { color: var(--ink2); }
        .strength-wrap { margin-top: .4rem; display: none; }
        .strength-wrap.show { display: block; }
        .strength-bar { height: 3px; border-radius: 2px; background: var(--border2); overflow: hidden; margin-bottom: .25rem; }
        .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width .3s, background .3s; }
        .strength-text { font-family: var(--mono); font-size: .6rem; color: var(--ink3); }
        .field-hint { font-family: var(--mono); font-size: .65rem; color: var(--ink3); margin-top: .3rem; }
        .field-hint.err { color: var(--danger); }
        .field-hint.ok  { color: var(--accent); }
        .btn-submit {
            width: 100%; padding: .7rem 1rem; margin-top: 1.5rem;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border: none; border-radius: var(--r); color: #fff;
            font-family: var(--display); font-size: .9rem; font-weight: 700;
            cursor: pointer; transition: opacity .15s, transform .15s;
            display: flex; align-items: center; justify-content: center; gap: .4rem;
            box-shadow: 0 4px 18px rgba(99,102,241,.4);
        }
        .btn-submit:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
        .btn-submit:active:not(:disabled) { transform: translateY(0); }
        .btn-submit:disabled { opacity: .55; cursor: not-allowed; }
        #msg {
            margin-top: .875rem; font-size: .8rem; font-weight: 500;
            text-align: center; min-height: 1.2rem; border-radius: 7px;
            padding: 0; transition: all .2s;
        }
        #msg.success {
            color: var(--accent); background: rgba(16,185,129,.08);
            border: 1px solid rgba(16,185,129,.2); padding: .55rem .875rem;
        }
        #msg.error {
            color: var(--danger); background: rgba(244,63,94,.06);
            border: 1px solid rgba(244,63,94,.18); padding: .55rem .875rem;
        }
        .login-link { margin-top: 1.125rem; text-align: center; font-size: .78rem; color: var(--ink3); }
        .login-link a { color: #818cf8; text-decoration: none; font-weight: 600; transition: color .14s; }
        .login-link a:hover { color: #a5b4fc; }
        @media (max-width: 480px) {
            body { padding: 1rem .75rem; align-items: flex-start; padding-top: 2rem; }
            .card { padding: 1.5rem 1.25rem; }
            .card-title { font-size: 1.15rem; }
        }
        @media (min-height: 700px) { body { align-items: center; } }
    </style>
</head>
<body>
<div class="card">

    <div class="brand">
        <div class="brand-mark"><i class="bi bi-recycle"></i></div>
        <div>
            <span class="brand-name">Mangaon Recyclers</span>
            <span class="brand-sub">v2 · Management</span>
        </div>
    </div>

    <div class="divider"></div>

    <h1 class="card-title">Create Admin Account</h1>
    <p class="card-sub">Set up a new administrator account.</p>

    <form id="form" autocomplete="off" novalidate>

        <div class="field">
            <label class="field-label" for="username">Username <span class="req">*</span></label>
            <div class="input-wrap">
                <i class="bi bi-person field-icon"></i>
                <input type="text" id="username" class="field-input"
                       placeholder="e.g. admin" autocomplete="off"
                       autocapitalize="none" spellcheck="false" required/>
            </div>
        </div>

        <div class="field">
            <label class="field-label" for="password">Password <span class="req">*</span></label>
            <div class="input-wrap">
                <i class="bi bi-lock field-icon"></i>
                <input type="password" id="password" class="field-input"
                       placeholder="Min. 6 characters" autocomplete="new-password" required/>
                <button type="button" class="eye-btn" id="eye1" aria-label="Toggle password">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <div class="strength-wrap" id="strength-wrap">
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <span class="strength-text" id="strength-text"></span>
            </div>
        </div>

        <div class="field">
            <label class="field-label" for="confirm">Confirm Password <span class="req">*</span></label>
            <div class="input-wrap">
                <i class="bi bi-lock-fill field-icon"></i>
                <input type="password" id="confirm" class="field-input"
                       placeholder="Re-enter password" autocomplete="new-password" required/>
                <button type="button" class="eye-btn" id="eye2" aria-label="Toggle confirm">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <p class="field-hint" id="confirm-hint"></p>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
            <i class="bi bi-person-plus"></i>
            <span id="btn-label">Create Admin Account</span>
        </button>
    </form>

    <p id="msg"></p>
    <p class="login-link">Already have an account? <a href="/login.html">Sign in</a></p>
</div>

<script>
    /* ── Eye toggles ── */
    function setupEye(btnId, inputId) {
        document.getElementById(btnId).addEventListener('click', function () {
            const inp  = document.getElementById(inputId);
            const icon = this.querySelector('i');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            icon.className = inp.type === 'text' ? 'bi bi-eye-slash' : 'bi bi-eye';
        });
    }
    setupEye('eye1', 'password');
    setupEye('eye2', 'confirm');

    /* ── Password strength ── */
    document.getElementById('password').addEventListener('input', function () {
        const val  = this.value;
        const wrap = document.getElementById('strength-wrap');
        const fill = document.getElementById('strength-fill');
        const text = document.getElementById('strength-text');
        if (!val) { wrap.classList.remove('show'); return; }
        wrap.classList.add('show');
        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = [
            { pct:'20%', color:'#f43f5e', label:'Very weak' },
            { pct:'40%', color:'#f97316', label:'Weak' },
            { pct:'60%', color:'#f59e0b', label:'Fair' },
            { pct:'80%', color:'#3b82f6', label:'Good' },
            { pct:'100%',color:'#10b981', label:'Strong' },
        ];
        const l = levels[Math.min(score, levels.length) - 1] || levels[0];
        fill.style.width = l.pct; fill.style.background = l.color;
        text.textContent = l.label; text.style.color = l.color;
    });

    /* ── Confirm match ── */
    document.getElementById('confirm').addEventListener('input', function () {
        const pw   = document.getElementById('password').value;
        const hint = document.getElementById('confirm-hint');
        if (!this.value) { hint.textContent = ''; hint.className = 'field-hint'; return; }
        if (this.value === pw) {
            hint.textContent = '✓ Passwords match'; hint.className = 'field-hint ok';
            this.classList.remove('error'); this.classList.add('success');
        } else {
            hint.textContent = '✗ Passwords do not match'; hint.className = 'field-hint err';
            this.classList.remove('success'); this.classList.add('error');
        }
    });

    /* ── Submit ── */
    document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn      = document.getElementById('submit-btn');
        const label    = document.getElementById('btn-label');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm').value;

        showMsg('', '');

        if (!username)           { showMsg('Username is required.', 'error'); document.getElementById('username').focus(); return; }
        if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); document.getElementById('password').focus(); return; }
        if (password !== confirm) { showMsg('Passwords do not match.', 'error'); document.getElementById('confirm').focus(); return; }

        btn.disabled = true; label.textContent = 'Creating…';

        try {
            // ✅ Correct endpoint — no token needed, no role in body
            const res = await fetch('/api/auth/register-admin', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ username, password })
            });

            if (res.ok) {
                showMsg('✓ Admin account created! Redirecting to login…', 'success');
                setTimeout(() => { window.location.href = '/login.html'; }, 1800);
            } else {
                let errMsg = 'Error creating account.';
                try { const j = await res.json(); errMsg = j.error || j.message || errMsg; }
                catch (_) { const t = await res.text().catch(() => ''); if (t) errMsg = t; }
                showMsg(errMsg, 'error');
                btn.disabled = false; label.textContent = 'Create Admin Account';
            }
        } catch (err) {
            showMsg('Network error. Please try again.', 'error');
            btn.disabled = false; label.textContent = 'Create Admin Account';
        }
    });

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text; el.className = type;
    }
</script>
</body>
</html>
