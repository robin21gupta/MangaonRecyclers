spring.application.name=mangaon-recycleers

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/mangaonData}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:Anil108}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Hibernate Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=${PORT:8080}

# JWT
security.jwt.secret=${JWT_SECRET:VGhpcy1pcy1hLXNpbXBsZS1sb25nLXNlY3JldC1rZXktZm9yLU1BTkdBT04=}
security.jwt.expiration-ms=86400000

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# Invoice upload
app.invoice.upload-dir=${UPLOAD_DIR:/app/uploads/invoices}